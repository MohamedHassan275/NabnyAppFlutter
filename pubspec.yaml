name: nabny
description: A new Flutter application.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0 # متوافق مع نسخة فلاتر الحديثة 3.27.x وما فوق

dependencies:
  flutter:
    sdk: flutter

  # الشبكات والبيانات
  http: ^1.3.0
  dio: ^5.7.0
  html: ^0.15.5
  intl: ^0.20.2

  # إدارة الحالة والراوتر
  get: ^4.6.6
  provider: ^6.1.2

  # واجهة المستخدم والتصميم
  dots_indicator: ^3.0.0
  fluttertoast: ^8.2.8
  transparent_image: ^2.0.1
  sizer: ^3.0.0
  smooth_page_indicator: ^1.2.0
  auto_size_text: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.1
  flutter_staggered_animations: ^1.0.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_screenutil: ^5.9.3
  carousel_slider: ^5.0.0
  persistent_bottom_nav_bar: ^6.2.1
  image_picker: ^1.0.7

  # الخرائط والموقع
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  location: ^7.0.1
  geocoding: ^3.0.0

  # الصلاحيات والتخزين
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.5
  url_launcher: ^6.3.1
  easy_localization: ^3.0.7

  # Firebase (إصدارات مستقرة وحديثة)
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  firebase_messaging: ^15.2.1
  firebase_analytics: ^11.4.1

  # أخرى
  otp_text_field: ^1.1.3
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/image_logo_app.png"
  remove_alpha_ios: true

  min_sdk_android: 21